{% extends "global/Page.html" %}
{% load otree %}

{% block title %}Chat avec l'IA{% endblock %}
{% block content %}

<div class="chat-section">
  <div class="chat-panel active">
    <div id="chatgpt-box" class="chat-messages"></div>

    <div id="gpt-thinking" class="gpt-thinking">
      <div class="chat-bubble chat-bubble--gpt">
        <i class="fa-solid fa-ellipsis fa-beat-fade"></i> GPT réfléchit…
      </div>
    </div>

    <div class="chat-input-area">
      <input id="user-gpt-input" type="text" placeholder="Écris ton message…" autocomplete="off" />
      <button id="send-gpt-button" class="btn-send" type="button">Envoyer</button>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById("user-gpt-input");
  const button = document.getElementById("send-gpt-button");
  const chatBox = document.getElementById("chatgpt-box");
  const thinkingEl = document.getElementById("gpt-thinking");

  function addBubble(text, cls) {
    const bubble = document.createElement("div");
    bubble.className = "chat-bubble " + cls;
    bubble.textContent = text;
    chatBox.appendChild(bubble);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  button.onclick = function (event) {
    event.preventDefault();

    const message = input.value.trim();
    if (!message) return;

    addBubble(message, "chat-bubble--self");
    thinkingEl.style.display = "block";

    liveSend({ message: message });

    input.value = "";
    input.focus();
  };

  liveRecv = function (data) {
    thinkingEl.style.display = "none";

    if (data.type === "gpt_error") {
      addBubble(data.message, "chat-bubble--gpt");
    } else {
      addBubble(data.reply, "chat-bubble--gpt");
    }
  };

  input.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      button.click();
      event.preventDefault();
    }
  });
</script>

{% endblock %}
